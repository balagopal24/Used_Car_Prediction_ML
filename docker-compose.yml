version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: used_cars_db
    environment:
      POSTGRES_DB: used_cars
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: .
    container_name: used_cars_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: used_cars
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app

volumes:
  pgdata:
